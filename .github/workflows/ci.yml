name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -no-fail ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Test with race detector
        run: go test ./... -race -count=1 -v

  build:
    name: Build artifacts
    needs: [lint, sast, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build all platforms
        run: make build

      - name: Upload linux amd64
        uses: actions/upload-artifact@v4
        with:
          name: gmake-linux-amd64
          path: build/gmake-linux-amd64

      - name: Upload linux arm64
        uses: actions/upload-artifact@v4
        with:
          name: gmake-linux-arm64
          path: build/gmake-linux-arm64

      - name: Upload darwin amd64
        uses: actions/upload-artifact@v4
        with:
          name: gmake-darwin-amd64
          path: build/gmake-darwin-amd64

      - name: Upload darwin arm64
        uses: actions/upload-artifact@v4
        with:
          name: gmake-darwin-arm64
          path: build/gmake-darwin-arm64

      - name: Upload windows amd64
        uses: actions/upload-artifact@v4
        with:
          name: gmake-windows-amd64
          path: build/gmake-windows-amd64.exe

      - name: Upload windows arm64
        uses: actions/upload-artifact@v4
        with:
          name: gmake-windows-arm64
          path: build/gmake-windows-arm64.exe
